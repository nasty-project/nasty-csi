name: Snapshot/Clone Stress Tests

on:
  # Run after Integration Tests complete successfully
  workflow_run:
    workflows: ["Integration Tests"]
    types:
      - completed
  # Manual trigger
  workflow_dispatch:

# Restrict permissions to minimum required
permissions:
  contents: read

# Ensure only one test run at a time
concurrency:
  group: snapclone-stress
  cancel-in-progress: false

jobs:
  compute-tag:
    name: Compute Image Tag
    runs-on: new
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag from ref
        id: tag
        env:
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF_NAME="$WORKFLOW_HEAD_BRANCH"
          else
            REF_NAME="${{ github.ref_name }}"
          fi

          if [ "$REF_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG=$(echo "$REF_NAME" | sed 's/\//-/g')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  snapclone-stress:
    name: "Snapshot/Clone Stress (all protocols)"
    runs-on: new
    timeout-minutes: 210
    needs: compute-tag
    if: |
      !cancelled() && needs.compute-tag.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: fenio/setup-k3s@v5
        with:
          k3s-args: '--write-kubeconfig-mode 644 --disable=traefik --disable=local-storage'
      - uses: ./.github/actions/setup-snapshots
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Run Snapshot/Clone Stress Tests
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
          TRUENAS_POOL: ${{ secrets.TRUENAS_POOL }}
          CSI_IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          echo "=== Running Snapshot/Clone Stress E2E Tests ==="
          echo "=== 14 tests × 4 protocols (NFS, SMB, NVMe-oF, iSCSI) = 56 total ==="
          ginkgo -v --timeout=190m --flake-attempts=2 ./tests/e2e/snapclone/...
      - name: Upload diagnostic logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-snapclone-stress-diagnostics
          path: /tmp/test-logs/
          retention-days: 7
