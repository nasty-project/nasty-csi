name: "NVMe-oF Snapshot Repro"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests
  cancel-in-progress: false

jobs:
  nvmeof-snapshot-repro:
    name: "NVMe-oF Snapshot Stress/Restore"
    runs-on: new
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: nasty-project/nasty-go
          token: ${{ secrets.NASTY_PAT }}
          path: nasty-go
      - uses: actions/checkout@v6
        with:
          repository: nasty-project/nasty-chart
          token: ${{ secrets.NASTY_PAT }}
          path: nasty-chart
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: fenio/setup-k3s@v5
        with:
          k3s-args: '--write-kubeconfig-mode 644 --disable=traefik --disable=local-storage'
      - uses: ./.github/actions/setup-snapshots
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Verify NASty engine version
        env:
          NASTY_HOST: ${{ secrets.NASTY_HOST }}
          NASTY_API_KEY: ${{ secrets.NASTY_API_KEY }}
        run: |
          # Quick API call to verify engine is reachable and check version
          echo '{"jsonrpc":"2.0","method":"system.info","id":1}' | \
            websocat -1 --header "Authorization: Bearer ${NASTY_API_KEY}" \
            "wss://${NASTY_HOST}/ws" -k 2>/dev/null || echo "websocat not available, skipping version check"
      - name: Run failing NVMe-oF snapshot tests
        env:
          NASTY_HOST: ${{ secrets.NASTY_HOST }}
          NASTY_API_KEY: ${{ secrets.NASTY_API_KEY }}
          NASTY_POOL: ${{ secrets.NASTY_POOL }}
          CSI_IMAGE_TAG: latest
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          CSI_CHART_PATH: ${{ github.workspace }}/nasty-chart
        run: |
          echo "=== NVMe-oF Snapshot I/O Repro ==="
          ginkgo -v --timeout=10m \
            --focus="Snapshot I/O Repro" \
            ./tests/e2e/nvmeof/...
      - name: Check NASty engine logs for nocow
        if: always()
        env:
          NASTY_HOST: ${{ secrets.NASTY_HOST }}
          NASTY_API_KEY: ${{ secrets.NASTY_API_KEY }}
          NASTY_POOL: ${{ secrets.NASTY_POOL }}
        run: |
          echo "=== Checking if vol.img files have nocow set ==="
          echo "Querying NASty for block subvolumes..."
          # Use the CSI controller to list subvolumes — the engine logs will show nocow
          kubectl logs -n kube-system -l app.kubernetes.io/component=controller -c nasty-csi-plugin --tail=-1 2>/dev/null | grep -i "nocow\|vol.img\|block subvolume\|set-file-option" || echo "No nocow-related logs found in controller"
      - name: Collect diagnostic logs
        if: always()
        run: |
          mkdir -p /tmp/test-logs
          kubectl logs -n kube-system -l app.kubernetes.io/component=controller -c nasty-csi-plugin --tail=-1 > /tmp/test-logs/controller.log 2>&1 || true
          kubectl logs -n kube-system -l app.kubernetes.io/component=node -c nasty-csi-plugin --tail=-1 > /tmp/test-logs/node.log 2>&1 || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/test-logs/events.log 2>&1 || true
          dmesg > /tmp/test-logs/dmesg.log 2>&1 || true
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nvmeof-snapshot-repro-logs
          path: /tmp/test-logs/
          retention-days: 7
