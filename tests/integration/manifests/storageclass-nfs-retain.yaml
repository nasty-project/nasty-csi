# StorageClass with deleteStrategy=retain for testing
# When a PV is deleted, the underlying NASty resources are retained
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nasty-csi-nfs-retain
provisioner: nasty.csi.io
parameters:
  protocol: nfs
  server: "${NASTY_HOST}"
  filesystem: "${NASTY_FILESYSTEM}"
  deleteStrategy: retain
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
