# StorageClass with bcachefs properties for NFS testing
# Tests: compression
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nasty-csi-nfs-props
provisioner: nasty.csi.io
parameters:
  protocol: "nfs"
  filesystem: "${NASTY_FILESYSTEM}"
  server: "${NASTY_HOST}"
  compression: "lz4"
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
