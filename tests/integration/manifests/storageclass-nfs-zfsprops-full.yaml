# StorageClass with comprehensive bcachefs properties for NFS testing
# Tests all supported properties that can be set via StorageClass
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nasty-csi-nfs-props-full
provisioner: nasty.csi.io
parameters:
  protocol: nfs
  server: "${NASTY_HOST}"
  filesystem: "${NASTY_FILESYSTEM}"
  compression: "lz4"
  deleteStrategy: "delete"
  # Tiering targets (requires labeled devices in the filesystem)
  # foregroundTarget: "ssd"
  # backgroundTarget: "hdd"
  # promoteTarget: "ssd"
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
