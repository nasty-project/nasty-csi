{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nasty-csi-driver.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nasty-csi-driver.labels" . | nindent 4 }}
    {{- range $key, $value := .Values.grafana.dashboards.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- with .Values.grafana.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  nasty-csi-overview.json: |-
    {{- .Files.Get "dashboards/nasty-csi-overview.json" | nindent 4 }}
{{- end }}
