apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nasty-csi-driver.fullname" . }}-node
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nasty-csi-driver.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nasty-csi-driver.node.selectorLabels" . | nindent 6 }}
  {{- with .Values.node.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "nasty-csi-driver.node.selectorLabels" . | nindent 8 }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.customAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "nasty-csi-driver.node.serviceAccountName" . }}
      {{- if .Values.priorityClassName.node }}
      priorityClassName: {{ .Values.priorityClassName.node }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      hostPID: true   # Required for iSCSI nsenter to access host's iscsid (Talos)
      hostIPC: true   # Required for iSCSI to communicate with host's iscsid daemon
      containers:
        # NASty CSI Node Plugin
        - name: nasty-csi-plugin
          image: "{{ .Values.image.repository }}:{{ include "nasty-csi-driver.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--endpoint=unix:///csi/csi.sock"
            - "--node-id=$(NODE_ID)"
            - "--api-url=$(NASTY_URL)"
            - "--api-key=$(NASTY_API_KEY)"
            - "--v={{ .Values.node.logLevel }}"
            {{- if .Values.nasty.skipTLSVerify }}
            - "--skip-tls-verify"
            {{- end }}
            {{- if .Values.node.enableNVMeDiscovery }}
            - "--enable-nvme-discovery"
            {{- end }}
            - "--max-concurrent-nvme-connects={{ .Values.node.maxConcurrentNVMeConnects | default 5 }}"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NASTY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nasty-csi-driver.secretName" . }}
                  key: url
            - name: NASTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nasty-csi-driver.secretName" . }}
                  key: api-key
            {{- if .Values.node.debug }}
            - name: DEBUG_CSI
              value: "true"
            {{- end }}
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: pods-mount-dir
              mountPath: {{ .Values.node.kubeletPath }}/pods
              mountPropagation: Bidirectional
            - name: plugins-mount-dir
              mountPath: {{ .Values.node.kubeletPath }}/plugins
              mountPropagation: Bidirectional
            - name: device-dir
              mountPath: /dev
            - name: sys-dir
              mountPath: /sys
            - name: registry-dir
              mountPath: /var/lib/nasty-csi
            # iSCSI requires access to host iscsid socket and configuration
            - name: run-dir
              mountPath: /run
            - name: iscsi-dir
              mountPath: /etc/iscsi
          resources:
            {{- toYaml .Values.node.resources | nindent 12 }}

        # CSI Node Driver Registrar sidecar
        - name: csi-node-driver-registrar
          image: "{{ .Values.sidecars.nodeDriverRegistrar.image.repository }}:{{ .Values.sidecars.nodeDriverRegistrar.image.tag }}"
          imagePullPolicy: {{ .Values.sidecars.nodeDriverRegistrar.image.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
            - "--v={{ .Values.node.logLevel }}"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: {{ .Values.node.kubeletPath }}/plugins/{{ .Values.csiDriverName }}/csi.sock
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
          resources:
            {{- toYaml .Values.sidecars.nodeDriverRegistrar.resources | nindent 12 }}

        # CSI Liveness Probe sidecar
        - name: liveness-probe
          image: "{{ .Values.sidecars.livenessprobe.image.repository }}:{{ .Values.sidecars.livenessprobe.image.tag }}"
          imagePullPolicy: {{ .Values.sidecars.livenessprobe.image.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--health-port=9808"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
          resources:
            {{- toYaml .Values.sidecars.livenessprobe.resources | nindent 12 }}

      volumes:
        - name: plugin-dir
          hostPath:
            path: {{ .Values.node.kubeletPath }}/plugins/{{ .Values.csiDriverName }}
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: {{ .Values.node.kubeletPath }}/plugins_registry
            type: Directory
        - name: pods-mount-dir
          hostPath:
            path: {{ .Values.node.kubeletPath }}/pods
            type: Directory
        - name: plugins-mount-dir
          hostPath:
            path: {{ .Values.node.kubeletPath }}/plugins
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: registry-dir
          hostPath:
            path: /var/lib/nasty-csi
            type: DirectoryOrCreate
        # iSCSI: host run directory for iscsid socket
        - name: run-dir
          hostPath:
            path: /run
            type: Directory
        # iSCSI: host iSCSI configuration and initiator name
        - name: iscsi-dir
          hostPath:
            path: /etc/iscsi
            type: DirectoryOrCreate

      {{- with .Values.node.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
