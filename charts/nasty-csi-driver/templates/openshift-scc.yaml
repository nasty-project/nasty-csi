{{- if .Values.openshift.enabled }}
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "nasty-csi-driver.fullname" . }}-node
  labels:
    {{- include "nasty-csi-driver.labels" . | nindent 4 }}
allowPrivilegedContainer: true
allowHostNetwork: true
allowHostIPC: true
allowHostPID: true
allowHostPorts: true
allowHostDirVolumePlugin: true
allowedCapabilities:
  - SYS_ADMIN
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - SETGID
  - SETUID
allowPrivilegeEscalation: true
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - "*"
users:
  - system:serviceaccount:{{ .Values.namespace }}:{{ include "nasty-csi-driver.node.serviceAccountName" . }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nasty-csi-driver.fullname" . }}-scc
  labels:
    {{- include "nasty-csi-driver.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["{{ include "nasty-csi-driver.fullname" . }}-node"]
    verbs: ["use"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nasty-csi-driver.fullname" . }}-scc
  labels:
    {{- include "nasty-csi-driver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nasty-csi-driver.fullname" . }}-scc
subjects:
  - kind: ServiceAccount
    name: {{ include "nasty-csi-driver.node.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
